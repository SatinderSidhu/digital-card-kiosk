<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Brand-gradient rounded background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- White QR canvas -->
  <rect x="3" y="3" width="26" height="26" rx="2" fill="#ffffff"/>

  <!-- Three QR finder patterns (concentric squares) at TL, TR, BL -->
  <g fill="#0b0f1a">
    <!-- top-left -->
    <rect x="5"  y="5"  width="7" height="7"/>
    <rect x="6"  y="6"  width="5" height="5" fill="#ffffff"/>
    <rect x="7"  y="7"  width="3" height="3"/>
    <!-- top-right -->
    <rect x="20" y="5"  width="7" height="7"/>
    <rect x="21" y="6"  width="5" height="5" fill="#ffffff"/>
    <rect x="22" y="7"  width="3" height="3"/>
    <!-- bottom-left -->
    <rect x="5"  y="20" width="7" height="7"/>
    <rect x="6"  y="21" width="5" height="5" fill="#ffffff"/>
    <rect x="7"  y="22" width="3" height="3"/>
  </g>

  <!-- Stylised data modules — picked to balance visually, not random -->
  <g fill="#0b0f1a">
    <rect x="14" y="6"  width="2" height="2"/>
    <rect x="17" y="5"  width="2" height="2"/>
    <rect x="14" y="9"  width="2" height="2"/>
    <rect x="17" y="10" width="2" height="2"/>

    <rect x="14" y="13" width="2" height="2"/>
    <rect x="20" y="14" width="2" height="2"/>
    <rect x="23" y="15" width="2" height="2"/>
    <rect x="17" y="16" width="2" height="2"/>
    <rect x="13" y="17" width="2" height="2"/>
    <rect x="20" y="18" width="2" height="2"/>
    <rect x="25" y="19" width="2" height="2"/>

    <rect x="14" y="22" width="2" height="2"/>
    <rect x="17" y="22" width="2" height="2"/>
    <rect x="20" y="23" width="2" height="2"/>
    <rect x="14" y="25" width="2" height="2"/>
    <rect x="23" y="25" width="2" height="2"/>
    <rect x="17" y="26" width="2" height="2"/>
    <rect x="20" y="26" width="2" height="2"/>
  </g>
</svg>
